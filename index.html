<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bíblia Kids</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="topo">
  <h1>📖 Bíblia Kids</h1>
  <p>⚡ <span id="moedas">0</span></p>
</div>

<!-- HOME -->
<div id="home" class="tela">

  <div class="banner azul" onclick="abrirMapa()">
    <h2>🎮 Jogar</h2>
    <p>Modo aventura</p>
  </div>

  <div class="banner verde">
    <h2>📖 Bíblia</h2>
    <p>Histórias</p>
  </div>

  <div class="banner roxo">
    <h2>🧠 Quiz</h2>
    <p>Desafios</p>
  </div>

  <div class="banner laranja">
    <h2>👤 Personagem</h2>
    <p>Customizar</p>
  </div>

</div>

<!-- MAPA -->
<div id="mapa" class="tela hidden"></div>

<!-- FASE -->
<div id="fase" class="tela hidden">

  <div class="game-card">
    <h2 id="tituloFase"></h2>
    <h3 id="pergunta"></h3>

    <input id="resposta" placeholder="Digite a resposta">

    <p>⏱️ <span id="tempo">60</span></p>

    <button onclick="responder()">Responder</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
