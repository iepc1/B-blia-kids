<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Bíblia Kids</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="topo">
  <h1>📖 Bíblia Kids</h1>
  <p>⚡ <span id="moedas">0</span></p>
</div>

<!-- HOME -->
<div id="home" class="tela">
  <div class="card" onclick="abrirMapa()">🎮 Jogar</div>
  <div class="card">📖 Bíblia</div>
  <div class="card">🧠 Quiz</div>
  <div class="card">👤 Personagem</div>
</div>

<!-- MAPA -->
<div id="mapa" class="tela hidden"></div>

<!-- FASE -->
<div id="fase" class="tela hidden">

  <div class="game-card">
    <h2 id="tituloFase"></h2>

    <h3 id="pergunta"></h3>

    <input id="resposta" placeholder="Digite aqui...">

    <p>⏱️ Tempo: <span id="tempo">60</span></p>

    <button onclick="responder()">Responder</button>
  </div>

</div>

<!-- MENU -->
<div id="menu">
  <button onclick="mostrarTela('home')">🏠</button>
  <button onclick="abrirMapa()">🗺️</button>
  <button>📖</button>
  <button>👤</button>
</div>

<script src="script.js"></script>
</body>
</html>
