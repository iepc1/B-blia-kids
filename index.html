<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Kids</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📖 Bíblia Kids</h1>

<div id="menu">
  <button onclick="abrirTela('mapa')">🎮 Jogo</button>
  <button onclick="abrirTela('biblia')">📖 Bíblia</button>
  <button onclick="abrirTela('manga')">🎨 Mangá</button>
</div>

<div id="topo">
  ⭐ <span id="pontos">0</span> | 👤 <span id="personagem">Noé</span>
</div>

<div id="mapa"></div>

<div id="fase" class="hidden">
  <h2 id="tituloFase"></h2>
  <p>⏱️ Tempo: <span id="tempo">60</span></p>
  <p id="pergunta"></p>
  <div id="opcoes"></div>
</div>

<div id="biblia" class="hidden">
  <h2>📖 Bíblia Infantil</h2>
  <img src="manga/1.jpg" width="250">
  <p>Noé construiu uma arca para salvar os animais.</p>
</div>

<div id="manga" class="hidden">
  <h2>🎨 Bíblia em Mangá</h2>
  <img id="paginaManga" src="manga/1.jpg" width="300">
  <br><br>
  <button onclick="anterior()">⬅️</button>
  <span id="numPagina">1</span>
  <button onclick="proxima()">➡️</button>
</div>

<script src="script.js"></script>
</body>
</html>
